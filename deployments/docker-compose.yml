  services:
    redis:
      image: redis:7-alpine
      profiles:
        - all
        - db
      restart: unless-stopped
      ports:
        - "6379:6379"
      volumes:
        - redis-data:/data
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

    postgres:
      image: postgres:15-alpine
      profiles:
        - all
        - db
      restart: unless-stopped
      environment:
        POSTGRES_DB: pipeline
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      ports:
        - "5432:5432"
      volumes:
        - pg-data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d pipeline"]
        interval: 10s
        timeout: 5s
        retries: 5

    postgres-legacy:
      image: postgres:15-alpine
      profiles:
        - all
        - db
      restart: unless-stopped
      environment:
        POSTGRES_DB: legacy
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      ports:
        - "5433:5432"
      volumes:
        - pg-legacy-data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d legacy"]
        interval: 10s
        timeout: 5s
        retries: 5

    proxy-manager:
#      image: go-dota/proxy-manager:latest
      profiles:
        - all
        - go
      build:
        context: ..
        dockerfile: deployments/Dockerfile.proxy-manager
      restart: unless-stopped
      depends_on:
        redis:
          condition: service_healthy
      volumes:
        - ./proxy.json:/app/deployments/proxy.json:ro
      environment:
        REDIS_URL: redis://redis:6379/0
        PROXY_PROVIDER_URL: ${PROXY_PROVIDER_URL:-}
        PROXY_LOCAL_FILE: /app/deployments/proxy.json
        HEALTH_CHECK_URL: https://httpbin.org/ip
        PROXY_REFRESH_MIN: "15"

    collector:
#      image: go-dota/collector:latest
      profiles:
        - all
        - go
      build:
        context: ..
        dockerfile: deployments/Dockerfile.collector
      restart: unless-stopped
      depends_on:
        redis:
          condition: service_healthy
      environment:
        REDIS_URL: redis://redis:6379/0
        TARGET_API_URL: https://api.opendota.com/api/matches
        COLLECTOR_WORKERS: "10"
        SKIP_TLS_VERIFY: "false"

    parser:
#      image: go-dota/parser:latest
      profiles:
        - all
        - go
      build:
        context: ..
        dockerfile: deployments/Dockerfile.parser
      restart: unless-stopped
      depends_on:
        redis:
          condition: service_healthy
        postgres:
          condition: service_healthy
        postgres-legacy:
          condition: service_healthy
      environment:
        REDIS_URL: redis://redis:6379/0
        POSTGRES_URL: postgres://postgres:postgres@postgres:5432/pipeline?sslmode=disable&pool_max_conns=20
        LEGACY_POSTGRES_URL: postgres://postgres:postgres@postgres-legacy:5432/legacy?sslmode=disable&pool_max_conns=10
        PARSER_WORKERS: "5"

    fetcher:
#      image: go-dota/fetcher:latest
      profiles:
        - go
      build:
        context: ..
        dockerfile: deployments/Dockerfile.fetcher
      restart: unless-stopped
      depends_on:
        redis:
          condition: service_healthy
        postgres-legacy:
          condition: service_healthy
      environment:
        REDIS_URL: redis://redis:6379/0
        POSTGRES_URL: postgres://postgres:postgres@postgres:5432/pipeline?sslmode=disable
        LEGACY_POSTGRES_URL: postgres://postgres:postgres@postgres-legacy:5432/legacy?sslmode=disable
        SQL_DIR: /app/deployments/queries

    monitor:
#      image: go-dota/monitor:latest
      profiles:
        - all
        - go
      build:
        context: ..
        dockerfile: deployments/Dockerfile.monitor
      restart: unless-stopped
      depends_on:
        redis:
          condition: service_healthy
        postgres:
          condition: service_healthy
        postgres-legacy:
          condition: service_healthy
      environment:
        REDIS_URL: redis://redis:6379/0
        POSTGRES_URL: postgres://postgres:postgres@postgres:5432/pipeline?sslmode=disable&pool_max_conns=20
        LEGACY_POSTGRES_URL: postgres://postgres:postgres@postgres-legacy:5432/legacy?sslmode=disable&pool_max_conns=10
        MONITOR_PORT: "8080"
      ports:
        - "8080:8080"

  volumes:
    redis-data:
    pg-data:
    pg-legacy-data:
