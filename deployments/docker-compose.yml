services:
  redis:
    image: redis:7-alpine
    profiles:
      - all
      - db
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    profiles:
      - all
      - db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    profiles:
      - all
      - go
    image: deployments-parser:latest
    restart: "no"
    entrypoint: ["/bin/parser", "--migrate-only"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pipeline}?sslmode=disable

  proxy-manager:
    image: deployments-proxy-manager:latest
    profiles:
      - all
      - go
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./proxy.json:/app/deployments/proxy.json:ro
    environment:
      REDIS_URL: redis://redis:6379/0
      PROXY_PROVIDER_URL: ${PROXY_PROVIDER_URL:-}
      PROXY_LOCAL_FILE: /app/deployments/proxy.json
      HEALTH_CHECK_URL: https://httpbin.org/ip
      PROXY_REFRESH_MIN: "15"
    healthcheck:
      test: ["CMD-SHELL", "test \"$(redis-cli -h redis SCARD proxy_pool)\" -gt 0"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 15s

  collector:
    image: deployments-collector:latest
    profiles:
      - all
      - go
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      proxy-manager:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      COLLECTOR_WORKERS: "10"
      SKIP_TLS_VERIFY: "false"

  parser:
    image: deployments-parser:latest
    profiles:
      - all
      - go
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pipeline}?sslmode=disable&pool_max_conns=20
      PARSER_WORKERS: "5"

  fetcher:
    image: deployments-fetcher:latest
    profiles:
      - all
      - go
    restart: unless-stopped
    command: ["--key=default", "--interval=24h"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      proxy-manager:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pipeline}?sslmode=disable
      SQL_DIR: /app/deployments/queries
    volumes:
      - ./queries:/app/deployments/queries:ro

  monitor:
    image: deployments-monitor:latest
    profiles:
      - all
      - go
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pipeline}?sslmode=disable&pool_max_conns=20
      MONITOR_PORT: "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  enricher:
    image: deployments-enricher:latest
    profiles:
      - all
      - go
    restart: unless-stopped
    command: ["/bin/enricher", "--interval=24h"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      proxy-manager:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pipeline}?sslmode=disable

  partition-manager:
    image: deployments-partition-manager:latest
    profiles:
      - all
      - go
    restart: unless-stopped
    command: ["/bin/partition-manager", "--ahead=3", "--retention-months=0", "--detach-only=true", "--interval=24h"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pipeline}?sslmode=disable

volumes:
  redis-data:
  pg-data: